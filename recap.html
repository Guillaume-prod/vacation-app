
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Récapitulatif automatique</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<div id="status" style="font-family:sans-serif;padding:20px;font-size:14px">⏳ Envoi du récapitulatif en cours...</div>
<script>
const SUPABASE_URL = 'https://bmdrlnqtjkgkjryatdbz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dES9U1T02LLNFXtR2RgtLg_b4UWK5cv';
const EMAILJS_SERVICE = 'service_qtkzz3d';
const EMAILJS_TEMPLATE = 'template_pm7xbso';
const EMAILJS_KEY = 'eqbebprUUz1zVz_tv';
const EQUIPES = ['Concentration', 'Soirée', 'Nuit'];
const ICONS = {Concentration:'☀️', Soirée:'🌆', Nuit:'🌙'};
const TYPES = {liaison:'🚛',colis:'📦',incident:'⚠️',anomalie:'🔧'};

emailjs.init(EMAILJS_KEY);

async function sbGet(path){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
  });
  const t = await res.text(); return t ? JSON.parse(t) : [];
}

function fmtHeure(iso){
  const d = new Date(iso.endsWith('Z')?iso:iso+'Z');
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

async function envoyerRecap(){
  const status = document.getElementById('status');
  try {
    // Période : 11h00 de la veille → 7h30 aujourd'hui
    const maintenant = new Date();
    const hier = new Date(maintenant);
    hier.setDate(hier.getDate()-1);
    // Début : hier à 11h00 UTC+2 = 09h00 UTC
    const dateDebut = hier.toISOString().split('T')[0] + 'T09:00:00Z';
    // Fin : maintenant (7h30 aujourd'hui)
    const dateFin = maintenant.toISOString();
    const dateLabel = hier.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) + ' 11h00 → ' + maintenant.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}) + ' 07h30';

    // Charger vacations de la veille
    const vacations = await sbGet(`vacations?created_at=gte.${dateDebut}&created_at=lte.${dateFin}&order=equipe.asc,date_debut.asc`);
    const agents = await sbGet('agents?order=nom.asc');
    const accidents = await sbGet(`accidents?created_at=gte.${dateDebut}&created_at=lte.${dateFin}&order=created_at.asc`);

    // Construire le contenu HTML par équipe
    let contenu = '';
    for(const equipe of EQUIPES){
      contenu += `<h3 style="color:#1a56a0;border-bottom:2px solid #1a56a0;padding-bottom:4px">${ICONS[equipe]} ${equipe.toUpperCase()}</h3>`;
      const vacsEquipe = vacations.filter(v=>v.equipe===equipe);
      if(!vacsEquipe.length){
        contenu += `<p style="color:#999;font-style:italic">Aucune vacation enregistrée.</p>`;
      } else {
        for(const v of vacsEquipe){
          const agent = agents.find(a=>a.id===v.agent_id);
          const evts = await sbGet(`evenements_vacation?vacation_id=eq.${v.id}&order=created_at.asc`);
          contenu += `<div style="margin-bottom:14px;padding:12px;background:#f4f6f9;border-radius:8px">`;
          contenu += `<div style="font-weight:700">${agent?.prenom||'?'} ${agent?.nom||''}</div>`;
          contenu += `<div style="font-size:12px;color:#666">${fmtHeure(v.date_debut)}${v.date_fin?' → '+fmtHeure(v.date_fin):' · en cours'}</div>`;
          if(evts.length){
            contenu += `<ul style="margin:8px 0 0 16px;font-size:13px">`;
            evts.forEach(e=>{ contenu += `<li>${TYPES[e.type]||'•'} ${e.texte}</li>`; });
            contenu += `</ul>`;
          } else {
            contenu += `<div style="font-size:12px;color:#999;margin-top:6px">Aucun élément enregistré.</div>`;
          }
          contenu += `</div>`;
        }
      }
    }

    // Accidents de la veille
    if(accidents.length){
      contenu += `<h3 style="color:#dc2626;border-bottom:2px solid #dc2626;padding-bottom:4px">🚨 ACCIDENTS (${accidents.length})</h3>`;
      for(const a of accidents){
        const agent = agents.find(x=>x.id===a.agent_id);
        contenu += `<div style="margin-bottom:14px;padding:12px;background:#fee2e2;border-radius:8px;border-left:4px solid #dc2626">`;
        contenu += `<div style="font-weight:700;color:#dc2626">🚨 Accident déclaré</div>`;
        if(a.personne) contenu += `<div><strong>Personne :</strong> ${a.personne}</div>`;
        contenu += `<div><strong>Déclaré par :</strong> ${agent?.prenom||'?'} ${agent?.nom||''}</div>`;
        contenu += `<div><strong>Lieu :</strong> ${a.lieu}${a.lieu_precision?' — '+a.lieu_precision:''}</div>`;
        contenu += `<div><strong>Comment :</strong> ${a.comment}</div>`;
        contenu += `<div><strong>Corps :</strong> ${a.partie_corps}${a.partie_corps_precision?' — '+a.partie_corps_precision:''}</div>`;
        contenu += `<div><strong>Blessure :</strong> ${a.type_blessure}</div>`;
        contenu += `<div><strong>SST :</strong> ${a.pris_en_charge_sst?'Oui':'Non'} | <strong>Hôpital :</strong> ${a.transporte_hopital?'Oui':'Non'}</div>`;
        if(a.temoins) contenu += `<div><strong>Témoins :</strong> ${a.temoins_noms||'Oui'}</div>`;
        if(a.remarques) contenu += `<div><strong>Remarques :</strong> ${a.remarques}</div>`;
        contenu += `</div>`;
      }
    }

    // Envoyer l'email
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      date: dateLabel,
      contenu: contenu,
    });

    status.innerHTML = `✅ Récapitulatif envoyé avec succès pour le ${dateLabel}`;
    status.style.color = '#16a34a';
  } catch(e) {
    status.innerHTML = `❌ Erreur : ${e.message}`;
    status.style.color = '#dc2626';
    console.error(e);
  }
}

envoyerRecap();
</script>
</body>
</html>
