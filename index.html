
<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --jaune: #FFD700; --jaune-pale: #FFF8DC;
  --bleu: #1a56a0; --bleu-fonce: #0f3a72; --bleu-clair: #e8f0fb;
  --gris: #f4f6f9; --gris-bord: #dde3ed;
  --texte: #1a1f2e; --texte-doux: #5a6478;
  --vert: #16a34a; --vert-pale: #dcfce7;
  --rouge: #dc2626; --rouge-pale: #fee2e2;
  --orange: #d97706; --orange-pale: #fef3c7;
  --violet: #7c3aed; --violet-pale: #ede9fe;
  --radius: 14px; --ombre: 0 2px 12px rgba(26,86,160,0.10);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gris); color: var(--texte); min-height: 100vh; max-width: 480px; margin: 0 auto; }
.header { background: var(--bleu); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-box { width: 36px; height: 36px; background: var(--jaune); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header-title { color: white; font-weight: 700; font-size: 16px; line-height: 1.1; }
.header-sub { color: rgba(255,255,255,0.65); font-size: 11px; }
.btn-deconnexion { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
.nav-bas { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid var(--gris-bord); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; gap: 3px; cursor: pointer; border: none; background: none; color: var(--texte-doux); font-size: 10px; font-weight: 500; }
.nav-item.active { color: var(--bleu); }
.nav-icon { font-size: 22px; }
.content { padding: 16px 16px 90px; }
.card { background: white; border-radius: var(--radius); box-shadow: var(--ombre); padding: 18px; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--texte-doux); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
.equipe-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }
.equipe-badge.Concentration { background: var(--bleu-clair); color: var(--bleu); }
.equipe-badge.Soirée { background: var(--violet-pale); color: var(--violet); }
.equipe-badge.Nuit { background: #1a1f2e; color: white; }
.equipe-badge.none { background: var(--gris); color: var(--texte-doux); }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge.en_cours { background: var(--orange-pale); color: var(--orange); }
.badge.terminee { background: var(--vert-pale); color: var(--vert); }
.type-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-btn { padding: 16px 10px; border: 2px solid var(--gris-bord); border-radius: 12px; background: white; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; color: var(--texte); line-height: 1.4; }
.type-btn:active { transform: scale(0.97); }
.demande-item { border: 1px solid var(--gris-bord); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.demande-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.demande-type { font-weight: 700; font-size: 14px; }
.demande-dates { font-size: 12px; color: var(--texte-doux); margin-top: 2px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--texte-doux); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gris-bord); border-radius: 10px; font-size: 14px; background: white; color: var(--texte); font-family: inherit; outline: none; }
.form-input:focus { border-color: var(--bleu); }
textarea.form-input { resize: none; }
.btn-primary { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--bleu); color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-mic { width: 100%; padding: 13px; border-radius: 10px; border: 2px solid var(--bleu); background: var(--bleu-clair); color: var(--bleu); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 10px; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-mic.listening { background: var(--rouge-pale); border-color: var(--rouge); color: var(--rouge); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
.login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: var(--bleu); }
.login-logo { width: 72px; height: 72px; background: var(--jaune); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 38px; margin-bottom: 16px; }
.login-title { color: white; font-size: 22px; font-weight: 800; margin-bottom: 4px; text-align:center; }
.login-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 32px; }
.login-card { background: white; border-radius: 18px; padding: 24px; width: 100%; max-width: 360px; }
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #1a1f2e; color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; max-width: 320px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: slideDown 0.2s ease; }
.toast.ok { background: var(--vert); }
.toast.err { background: var(--rouge); }
@keyframes slideDown { from { transform: translateX(-50%) translateY(-10px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
.admin-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
.admin-tab { flex-shrink: 0; padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--gris-bord); background: white; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--texte-doux); }
.admin-tab.active { border-color: var(--bleu); background: var(--bleu); color: white; }
.filtre-equipes { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
.filtre-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--gris-bord); background: white; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--texte-doux); }
.filtre-btn.active { border-color: var(--bleu); background: var(--bleu-clair); color: var(--bleu); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--texte-doux); font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.loader { text-align: center; padding: 40px; color: var(--texte-doux); }
.info-banner { background: var(--bleu-clair); border-radius: 10px; padding: 11px 14px; font-size: 12px; color: var(--bleu-fonce); margin-bottom: 14px; line-height: 1.5; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: white; border-radius: 18px 18px 0 0; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-annuler { flex: 1; padding: 13px; border-radius: 10px; border: 1.5px solid var(--gris-bord); background: white; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--texte-doux); }
.agent-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--gris); cursor: pointer; }
.agent-item:last-child { border-bottom: none; }
.agent-name { font-weight: 600; font-size: 14px; }
.agent-code { font-size: 11px; color: var(--texte-doux); font-family: monospace; }
.timeline-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gris); }
.timeline-time { font-weight: 700; font-size: 12px; color: var(--bleu); flex-shrink: 0; width: 42px; }
.timeline-content { flex: 1; font-size: 13px; }
.cat-section { margin-bottom: 16px; }
.cat-header { font-weight: 700; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.cat-item { font-size: 13px; padding: 8px 10px; background: var(--gris); border-radius: 8px; margin-bottom: 6px; }
.changer-mdp-link { text-align: center; margin-top: 14px; }
.changer-mdp-link button { background: none; border: none; color: var(--bleu); font-size: 13px; cursor: pointer; text-decoration: underline; }
.view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
.view-toggle button { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--gris-bord); background: white; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--texte-doux); }
.view-toggle button.active { border-color: var(--bleu); background: var(--bleu-clair); color: var(--bleu); }
.lien-danger { background: none; border: none; color: var(--rouge); font-size: 13px; cursor: pointer; text-decoration: underline; }
.evt-photo { width: 100%; border-radius: 10px; margin-top: 8px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<div id="app"></div>
<script>
const SUPABASE_URL = 'https://bmdrlnqtjkgkjryatdbz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dES9U1T02LLNFXtR2RgtLg_b4UWK5cv';
const EMAILJS_SERVICE = 'service_qtkzz3d';
const EMAILJS_TEMPLATE = 'template_pm7xbso';
const EMAILJS_KEY = 'eqbebprUUz1zVz_tv';
const EQUIPES = ['Concentration', 'Soirée', 'Nuit'];
const ORDRE_EQUIPES = {Concentration:'Nuit', Soirée:'Concentration', Nuit:'Soirée'}; // équipe précédente
const TYPES_EVT = {
  liaison: {icon:'🚛', label:'Liaison', couleur:'#1a56a0'},
  colis: {icon:'📦', label:'Colis', couleur:'#d97706'},
  incident: {icon:'⚠️', label:'Incident', couleur:'#dc2626'},
  anomalie: {icon:'🔧', label:'Anomalie', couleur:'#7c3aed'},
};

const LIAISONS_PAR_EQUIPE = {
  'Concentration': ['Concentration 1','Concentration 2','Concentration 3','Erstein 1'],
  'Soirée': ['Erstein 1','Erstein 2','Erstein 3','Erstein 4','SUPP'],
  'Nuit': ['Erstein 4','Erstein 5','Erstein 6','Chronopost','SUPP'],
};

emailjs.init(EMAILJS_KEY);

async function sbFetch(method, path, body){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok){ const e = await res.json().catch(()=>{}); throw new Error(e?.message||'Erreur'); }
  const t = await res.text(); return t ? JSON.parse(t) : [];
}
const db = {
  get: (t,q='') => sbFetch('GET',`${t}?${q}`),
  post: (t,d) => sbFetch('POST',t,d),
  patch: (t,q,d) => sbFetch('PATCH',`${t}?${q}`,d),
  delete: (t,q) => sbFetch('DELETE',`${t}?${q}`),
};

let S = {
  agent:null, vue:'vacation', adminTab:'vacations', filtreEquipe:'Toutes',
  vacationActive:null, evenementsVacation:[], dernierCREquipePrecedente:null,
  toutesVacations:[], tousAgents:[], compteRenduActuel:null, vueCR:'categorie',
  modal:null, evtTexte:'', evtPhotos:[], loading:false, editAgentId:null, liaison:{}, liaisonsModal:[],
};

function dateLocale(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function toast(msg,type='ok'){const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3500);}
function equipeBadge(eq){
  const e=eq||'—'; const cls=EQUIPES.includes(e)?e:'none';
  const icons={Concentration:'☀️',Soirée:'🌆',Nuit:'🌙'};
  return `<span class="equipe-badge ${cls}">${icons[e]||'👤'} ${e}</span>`;
}
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso.endsWith('Z')?iso:iso+'Z'); return d.toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function fmtHeure(iso){ const d=new Date(iso.endsWith('Z')?iso:iso+'Z'); return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function parsePhotos(photoUrl){
  if(!photoUrl) return [];
  try{ const p=JSON.parse(photoUrl); return Array.isArray(p)?p:[photoUrl]; }
  catch(e){ return [photoUrl]; }
}
function renderPhotos(photoUrl, style=''){
  const photos=parsePhotos(photoUrl);
  if(!photos.length) return '';
  return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px">${photos.map(url=>`<img src="${url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px${style?';'+style:''}" />`).join('')}</div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!S.agent){app.innerHTML=renderLogin();return;}
  let modalHtml='';
  if(S.modal==='liaison-structuree') modalHtml=renderModalLiaison();
  else if(S.modal && S.modal.startsWith('evenement-')) modalHtml=renderModalEvenement(S.modal.replace('evenement-',''));
  else if(S.modal==='compte-rendu') modalHtml=renderModalCompteRendu();
  else if(S.modal==='changer-code') modalHtml=renderModalChangerCode();
  else if(S.modal==='edit-agent') modalHtml=renderModalEditAgent();
  else if(S.modal==='accident') modalHtml=renderModalAccident();
  else if(S.modal==='recap-nuit') modalHtml=renderModalRecapNuit();
  app.innerHTML=`${renderHeader()}<div class="content">${S.loading?'<div class="loader">⏳ Chargement...</div>':renderVue()}</div>${renderNav()}${modalHtml}`;
}

function renderHeader(){
  return `<header class="header">
    <div class="header-logo"><div class="logo-box">🎙️</div>
    <div><div class="header-title">Vacation – La Poste</div><div class="header-sub">${S.agent.prenom} ${S.agent.nom}</div></div></div>
    <button class="btn-deconnexion" onclick="deconnexion()">Déconnexion</button>
  </header>`;
}
function renderNav(){
  const items=S.agent.est_responsable
    ?[['vacation','🎙️','Vacation'],['admin','⚙️','Admin']]
    :[['vacation','🎙️','Vacation']];
  return `<nav class="nav-bas">${items.map(([v,i,l])=>`<button class="nav-item ${S.vue===v?'active':''}" onclick="changerVue('${v}')"><span class="nav-icon">${i}</span>${l}</button>`).join('')}</nav>`;
}

function renderVue(){
  switch(S.vue){
    case 'vacation': return renderVacation();
    case 'admin': return renderAdmin();
    default: return renderVacation();
  }
}

// ── VACATION (agent) ───────────────────────────────────────────
function renderVacation(){
  if(!S.agent.equipe){
    return `<div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>Aucune équipe ne t'a été assignée. Contacte ton responsable.</div></div>`;
  }

  let html = '';

  // Compte rendu de l'équipe précédente
  if(S.dernierCREquipePrecedente){
    const cr = S.dernierCREquipePrecedente;
    const agentPrec = S.tousAgents.find(a=>a.id===cr.agent_id);
    html += `<div class="card" onclick="ouvrirCompteRenduPasse('${cr.id}')" style="cursor:pointer">
      <div class="card-title">📥 Passation — ${ORDRE_EQUIPES[S.agent.equipe]}</div>
      <div style="font-size:13px;color:var(--texte-doux)">Par ${agentPrec?.prenom||'?'} ${agentPrec?.nom||''} · ${fmtDateTime(cr.date_fin)}</div>
      <div class="info-banner" style="margin-top:10px;margin-bottom:0">👆 Touche pour voir le compte rendu complet de l'équipe précédente</div>
    </div>`;
  } else {
    html += `<div class="card"><div class="info-banner" style="margin-bottom:0">Aucun compte rendu disponible pour l'équipe précédente (${ORDRE_EQUIPES[S.agent.equipe]}).</div></div>`;
  }

  if(!S.vacationActive){
    html += `<div class="card">
      <div class="card-title">Démarrer ma vacation</div>
      <div class="info-banner">🎙️ Démarre ta vacation pour commencer à enregistrer tes liaisons, colis, incidents et anomalies tout au long du service.</div>
      <button class="btn-primary" onclick="demarrerVacation()">▶️ Démarrer ma vacation</button>
      <div class="changer-mdp-link"><button onclick="ouvrirChangerCode()">🔑 Changer mon code d'accès</button></div>
    </div>`;
    html += renderMesAnciennesVacations();
    return html;
  }

  const evts = S.evenementsVacation||[];
  html += `
  <div class="card">
    <div class="card-title">Vacation en cours · ${equipeBadge(S.agent.equipe)}</div>
    <div class="info-banner">🎙️ Appuie sur un bouton, dicte ou tape ta phrase, valide. Recommence autant de fois que nécessaire.</div>
    <div class="type-btns" style="margin-bottom:8px">
      <button class="type-btn" onclick="ouvrirSaisieEvenement('liaison')">🚛<br>Liaison</button>
      <button class="type-btn" onclick="ouvrirSaisieEvenement('incident')">⚠️<br>Incident</button>
    </div>
    <div class="type-btns">
      <button class="type-btn" onclick="ouvrirSaisieEvenement('anomalie')">🔧<br>Anomalie</button>
      <button class="type-btn" style="background:#fff0f0;border-color:#dc262633;color:var(--rouge);font-size:15px;padding:14px" onclick="ouvrirAccident()">🚨<br>Accident</button>
    </div>
    <div style="margin-top:8px">
      <button class="type-btn" style="width:100%;background:#fff0f0;border-color:#dc262633;color:var(--rouge);font-size:15px;padding:14px" onclick="ouvrirAccident()">🚨 Déclarer un accident</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Éléments enregistrés (${evts.length})</div>
    ${!evts.length?`<div class="empty-state"><div class="empty-icon">📭</div>Rien pour l'instant.</div>`:
      evts.map(e=>{
        const t=TYPES_EVT[e.type];
        return `<div class="demande-item">
          <div class="demande-header">
            <div>
              <div class="demande-type" style="color:${t.couleur}">${t.icon} ${t.label} · ${fmtHeure(e.created_at)}</div>
              <div class="demande-dates" style="margin-top:4px">${e.texte}</div>
            </div>
          </div>
          ${renderPhotos(e.photo_url)}
        </div>`;
      }).join('')
    }
  </div>

  <div class="card">
    <button class="btn-primary" style="background:var(--vert)" onclick="terminerVacation()">✅ Terminer la vacation</button>
  </div>`;
  html += renderMesAnciennesVacations();
  return html;
}

function renderMesAnciennesVacations(){
  const maintenant = new Date();
  const il12hAgo = new Date(maintenant.getTime() - 12*60*60*1000);
  const mesVac = (S.toutesVacations||[]).filter(v=>{
    if(v.agent_id!==S.agent.id || v.statut!=='terminee') return false;
    const dateFin = new Date(v.date_fin.endsWith('Z')?v.date_fin:v.date_fin+'Z');
    return dateFin >= il12hAgo;
  });
  if(!mesVac.length) return '';
  return `<div class="card">
    <div class="card-title">Ma vacation récente</div>
    <div class="info-banner" style="margin-bottom:10px">📋 Visible pendant 12h après la fin de ta vacation.</div>
    ${mesVac.map(v=>`
      <div class="demande-item" onclick="ouvrirCompteRendu('${v.id}')" style="cursor:pointer">
        <div class="demande-header">
          <div><div class="demande-type" style="font-size:13px">${fmtDateTime(v.date_debut)} → ${fmtDateTime(v.date_fin)}</div></div>
          <span class="badge terminee">✅ Voir</span>
        </div>
      </div>`).join('')}
  </div>`;
}

// ── SAISIE ÉVÉNEMENT ────────────────────────────────────────────
function ouvrirSaisieEvenement(type){
  if(type==='liaison'){ S.modal='liaison-structuree'; S.liaison={}; render(); return; }
  S.modal='evenement-'+type; S.evtTexte=''; S.evtPhotos=[]; render();
}

// Check URL params for direct vacation link
const urlParams = new URLSearchParams(window.location.search);
const vacationIdParam = urlParams.get('vacation');
if(vacationIdParam) S.vacationDirectId = vacationIdParam;

async function initApp(){
  // Restaurer la session si elle existe
  const savedSession = localStorage.getItem('vacation_session');
  if(savedSession){
    try{
      const session = JSON.parse(savedSession);
      const res = await db.get('agents', `id=eq.${session.id}&code_acces=eq.${encodeURIComponent(session.code)}&select=*`);
      if(res.length){
        S.agent = res[0];
        S.loading = true; render();
        await chargerTout();
        S.loading = false;
        if(S.vacationDirectId){
          await ouvrirCompteRendu(S.vacationDirectId);
          S.vacationDirectId = null;
        }
        render();
        return;
      } else {

  }

}

let recognition=null;
function demarrerEcoute(targetId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('Reconnaissance vocale non disponible','err'); return; }
  recognition = new SR();
  recognition.lang='fr-FR'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onresult=(ev)=>{
    const transcript=ev.results[0][0].transcript;
    const el=document.getElementById(targetId);
    if(el){ el.value=(el.value?el.value+' ':'')+transcript; S.evtTexte=el.value; }
  };
  recognition.onerror=()=>toast('Erreur micro, réessaie','err');
  recognition.start();
  toast('🎙️ Parle maintenant...','ok');
}

function gererPhotoEvt(input){
  const file=input.files[0]; if(!file) return;
  toast('📷 Chargement de la photo...','ok');
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=async ()=>{
      // Compresser l'image
      const maxDim=1200;
      let w=img.width, h=img.height;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // Convertir en blob
      canvas.toBlob(async (blob)=>{
        try{
          // Upload vers Supabase Storage
          const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
          const res = await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${fileName}`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'image/jpeg',
            },
            body: blob
          });
          if(!res.ok) throw new Error('Upload échoué');
          // Construire l'URL publique
          if(!S.evtPhotos) S.evtPhotos=[];
          S.evtPhotos.push(`${SUPABASE_URL}/storage/v1/object/public/photos/${fileName}`);
          toast(`✅ Photo ${S.evtPhotos.length} chargée !`,'ok');
          render();
        }catch(err){
          toast('Erreur upload photo: '+err.message,'err');
          console.error(err);
        }
      }, 'image/jpeg', 0.7);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function supprimerPhoto(index){
  S.evtPhotos.splice(index,1);

}

async function ajouterAgent(){
  const prenom=document.getElementById('new-prenom')?.value.trim();

  if(!prenom||!nom||!code) return toast('Remplis tous les champs','err');

async function connexion(){
  const prenom=document.getElementById('login-prenom')?.value.trim();
  const code=document.getElementById('login-code')?.value.trim();
  if(!prenom||!code) return;
  try{
    const res=await db.get('agents',`prenom=ilike.${encodeURIComponent(prenom)}&code_acces=eq.${encodeURIComponent(code)}&select=*`);
    if(!res.length){ document.getElementById('login-error').style.display='block'; return; }
    S.agent=res[0];
    // Sauvegarder la session
    localStorage.setItem('vacation_session', JSON.stringify({id:res[0].id, prenom:res[0].prenom, code:code}));
    S.loading=true; render();
    await chargerTout();
    S.loading=false;
    if(S.vacationDirectId){
      await ouvrirCompteRendu(S.vacationDirectId);
      S.vacationDirectId=null;
    }
    render();
  }catch(e){ toast('Erreur de connexion','err'); }
}

  localStorage.removeItem('vacation_session');
  S={...S, agent:null, vue:'vacation', vacationActive:null, evenementsVacation:[], modal:null};

}

async function validerLiaison(){
  const l = S.liaison||{};
  const nom = l.nom==='Autre' ? (l.nomAutre||'').trim() : l.nom;
  if(!nom) return toast('Choisis ou saisis le nom de la liaison','err');
  if(!l.arrivee) return toast("Indique l'heure d'arrivée",'err');

  const total = (l.concentration||0)+(l.dispersion||0)+(l.distribution||0);
  // Résumé texte pour le CR
  const texte = `${nom} | Arrivée: ${l.arrivee}${l.debut?' | Début: '+l.debut:''}${l.fin?' | Fin: '+l.fin:''} | Colis: ${total} (Conc: ${l.concentration||0} / Disp: ${l.dispersion||0} / Dist: ${l.distribution||0})`;

  try{
    // Enregistrer dans evenements_vacation pour le CR
    await db.post('evenements_vacation',{
      vacation_id: S.vacationActive.id,
      type: 'liaison',
      texte,
      photo_url: null,
    });
    // Enregistrer dans liaisons pour l'extraction structurée
    await db.post('liaisons',{
      vacation_id: S.vacationActive.id,
      agent_id: S.agent.id,
      nom,
      heure_arrivee: l.arrivee||null,
      heure_debut_traitement: l.debut||null,
      heure_fin_traitement: l.fin||null,
      colis_concentration: l.concentration||0,
      colis_dispersion: l.dispersion||0,
      colis_distribution: l.distribution||0,
    });
    toast('✅ Liaison enregistrée !','ok');
    S.liaison={};
    fermerModal();
    await chargerVacationEnCours();
    render();
  }catch(e){ toast('Erreur: '+e.message,'err'); }
}

          ${LIEUX_DEPOT.map(l=>`<option value="${l}" ${a.lieu===l?'selected':''}>${l}</option>`).join('')}
          <option value="Autre" ${a.lieu==='Autre'?'selected':''}>Autre (préciser)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Précision sur le lieu</label>
        <input class="form-input" type="text" id="acc-lieu-precision" placeholder="Ex : côté gauche du quai 3..." value="${a.lieu_precision||''}" oninput="S.accident.lieu_precision=this.value" />
      </div>

      <div class="form-group">
        <label class="form-label">Comment c'est arrivé</label>
        <textarea class="form-input" id="acc-comment" rows="3" placeholder="Décris les circonstances..." oninput="S.accident.comment=this.value">${a.comment||''}</textarea>
        <button class="btn-mic" style="margin-top:6px" onclick="demarrerEcoute('acc-comment')">🎙️ Dicter</button>
      </div>

      <div class="form-group">
        <label class="form-label">Partie du corps touchée</label>
        <select class="form-input" id="acc-corps" onchange="S.accident.partie_corps=this.value">
          <option value="">-- Choisir --</option>
          ${PARTIES_CORPS.map(p=>`<option value="${p}" ${a.partie_corps===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Précision partie du corps</label>
        <input class="form-input" type="text" id="acc-corps-precision" placeholder="Ex : face interne du genou..." value="${a.partie_corps_precision||''}" oninput="S.accident.partie_corps_precision=this.value" />
      </div>

      <div class="form-group">
        <label class="form-label">Type de blessure</label>
        <select class="form-input" id="acc-blessure" onchange="S.accident.type_blessure=this.value">
          <option value="">-- Choisir --</option>
          ${TYPES_BLESSURE.map(b=>`<option value="${b}" ${a.type_blessure===b?'selected':''}>${b}</option>`).join('')}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Prise en charge</label>
        <div style="display:flex;flex-direction:column;gap:10px;padding:12px 14px;border:1.5px solid var(--gris-bord);border-radius:10px">
          <label style="display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="acc-sst" ${a.sst?'checked':''} onchange="S.accident.sst=this.checked" style="width:18px;height:18px" />
            Pris en charge par un SST
          </label>
          <label style="display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="acc-hopital" ${a.hopital?'checked':''} onchange="S.accident.hopital=this.checked" style="width:18px;height:18px" />
            Transporté à l'hôpital
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Photo (optionnel)</label>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <label style="flex:1;padding:10px;border:1.5px solid var(--gris-bord);border-radius:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;background:var(--bleu-clair);color:var(--bleu)">
            📷 Appareil photo<input type="file" accept="image/*" capture="environment" onchange="gererPhotoEvt(this)" style="display:none" /></label>
          <label style="flex:1;padding:10px;border:1.5px solid var(--gris-bord);border-radius:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;background:var(--gris);color:var(--texte)">
            🖼️ Galerie<input type="file" accept="image/*" onchange="gererPhotoEvt(this)" style="display:none" /></label>
        </div>
        ${(S.evtPhotos&&S.evtPhotos.length)?`
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px">
            ${S.evtPhotos.map((url,i)=>`
              <div style="position:relative">
                <img src="${url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px" />
                <button onclick="supprimerPhoto(${i})" style="position:absolute;top:2px;right:2px;background:rgba(220,38,38,0.9);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer">✕</button>
              </div>`).join('')}
          </div>
          <div style="font-size:11px;color:var(--texte-doux);margin-top:4px">${S.evtPhotos.length} photo(s)</div>
        `:''}
      </div>

      <div class="form-group">
        <label class="form-label">Remarques</label>
        <textarea class="form-input" id="acc-remarques" rows="3" placeholder="Informations complémentaires..." oninput="S.accident.remarques=this.value">${a.remarques||''}</textarea>
        <button class="btn-mic" style="margin-top:6px" onclick="demarrerEcoute('acc-remarques')">🎙️ Dicter</button>
      </div>

      <div class="modal-btns">
        <button class="btn-annuler" onclick="fermerModal()">Annuler</button>
        <button class="btn-primary" style="flex:1;background:var(--rouge)" onclick="validerAccident()">🚨 Enregistrer</button>
      </div>
    </div>
  </div>`;
}

async function validerAccident(){
  const lieu = document.getElementById('acc-lieu')?.value;
  const comment = document.getElementById('acc-comment')?.value.trim();
  const corps = document.getElementById('acc-corps')?.value;
  const blessure = document.getElementById('acc-blessure')?.value;
  if(!lieu) return toast('Indique le lieu','err');
  if(!comment) return toast("Décris comment c'est arrivé",'err');
  if(!corps) return toast('Indique la partie du corps touchée','err');
  if(!blessure) return toast('Indique le type de blessure','err');
  try{
    const personne = document.getElementById('acc-personne')?.value.trim()||null;
    await db.post('accidents',{
      vacation_id: S.vacationActive?.id||null,
      agent_id: S.agent.id,
      personne,
      lieu,
      lieu_precision: document.getElementById('acc-lieu-precision')?.value.trim()||null,
      comment,
      partie_corps: corps,
      partie_corps_precision: document.getElementById('acc-corps-precision')?.value.trim()||null,
      type_blessure: blessure,
      temoins: document.getElementById('acc-temoins')?.checked||false,
      temoins_noms: document.getElementById('acc-temoins-noms')?.value.trim()||null,
      pris_en_charge_sst: document.getElementById('acc-sst')?.checked||false,
      transporte_hopital: document.getElementById('acc-hopital')?.checked||false,
      remarques: document.getElementById('acc-remarques')?.value.trim()||null,
      photo_url: (S.evtPhotos&&S.evtPhotos.length)?JSON.stringify(S.evtPhotos):null,
    });
    toast('🚨 Accident déclaré !','ok');
    // Envoyer email immédiat
    try{
      const dateLabel = new Date().toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      let contenuAccident = `<div style="padding:12px;background:#fee2e2;border-radius:8px;border-left:4px solid #dc2626">`;
      contenuAccident += `<h3 style="color:#dc2626">🚨 ACCIDENT DU TRAVAIL</h3>`;
      const pers = document.getElementById('acc-personne')?.value.trim();
      if(pers) contenuAccident += `<p><strong>👤 Personne accidentée :</strong> ${pers}</p>`;
      contenuAccident += `<p><strong>📍 Lieu :</strong> ${lieu}${document.getElementById('acc-lieu-precision')?.value?' — '+document.getElementById('acc-lieu-precision').value:''}</p>`;
      contenuAccident += `<p><strong>📝 Comment :</strong> ${comment}</p>`;
      contenuAccident += `<p><strong>🦵 Partie du corps :</strong> ${corps}${document.getElementById('acc-corps-precision')?.value?' — '+document.getElementById('acc-corps-precision').value:''}</p>`;
      contenuAccident += `<p><strong>🩹 Blessure :</strong> ${blessure}</p>`;
      contenuAccident += `<p><strong>🚑 SST :</strong> ${document.getElementById('acc-sst')?.checked?'✅ Oui':'❌ Non'} &nbsp; <strong>🏥 Hôpital :</strong> ${document.getElementById('acc-hopital')?.checked?'✅ Oui':'❌ Non'}</p>`;
      const temoins = document.getElementById('acc-temoins')?.checked;
      if(temoins) contenuAccident += `<p><strong>👁️ Témoins :</strong> ${document.getElementById('acc-temoins-noms')?.value||'Oui'}</p>`;
      const remarques = document.getElementById('acc-remarques')?.value.trim();
      if(remarques) contenuAccident += `<p><strong>💬 Remarques :</strong> ${remarques}</p>`;
      contenuAccident += `</div>`;
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        date: dateLabel,
        contenu: contenuAccident,
      });
    }catch(err){ console.warn('Email accident non envoyé', err); }
    S.evtPhoto=null;
    fermerModal();
  }catch(e){ toast('Erreur déclaration: '+e.message,'err'); console.error(e); }
}
</script>
</body>
</html>
