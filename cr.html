
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compte rendu – La Poste MLH</title>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f9; color: #1a1f2e; max-width: 800px; margin: 0 auto; padding: 20px; }
.header { background: #1a56a0; color: white; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.logo { width: 40px; height: 40px; background: #FFD700; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.7; }
.card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card-title { font-size: 13px; font-weight: 700; color: #5a6478; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.equipe-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #1a56a0; }
.equipe-title { font-size: 16px; font-weight: 700; color: #1a56a0; }
.agent-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.meta { font-size: 12px; color: #5a6478; margin-bottom: 12px; }
.timeline-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
.timeline-time { font-weight: 700; font-size: 11px; color: #1a56a0; min-width: 40px; padding-top: 2px; }
.timeline-type { font-weight: 700; font-size: 11px; margin-bottom: 2px; }
.timeline-texte { font-size: 12px; color: #333; }
.evt-photo { max-width: 100%; border-radius: 8px; margin-top: 6px; display: block; }
.empty { color: #999; font-style: italic; font-size: 13px; padding: 8px 0; }
.loader { text-align: center; padding: 40px; color: #5a6478; font-size: 14px; }
.btn-pdf { display: block; width: 100%; padding: 14px; background: #1a56a0; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; margin-top: 16px; }
.table-liaisons { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
.table-liaisons th { background: #1a56a0; color: white; padding: 7px; text-align: center; }
.table-liaisons th:first-child { text-align: left; }
.table-liaisons td { padding: 7px; border-bottom: 1px solid #eee; text-align: center; }
.table-liaisons td:first-child { text-align: left; font-weight: 600; }
.table-liaisons tr:nth-child(even) { background: #f4f6f9; }
.table-liaisons .total-row { background: #1a1f2e; color: white; font-weight: 700; }
.section-title { font-size: 12px; font-weight: 700; color: #5a6478; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 8px; }
.equipe-Concentration { border-left: 4px solid #1a56a0; padding-left: 12px; }
.equipe-Soirée { border-left: 4px solid #7c3aed; padding-left: 12px; }
.equipe-Nuit { border-left: 4px solid #1a1f2e; padding-left: 12px; }
@media print { .btn-pdf { display: none; } }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🎙️</div>
  <div>
    <div class="header-title">Comptes rendus de vacation</div>
    <div class="header-sub" id="periode-label">La Poste – Mulhouse</div>
  </div>
</div>
<div id="content"><div class="loader">⏳ Chargement des comptes rendus...</div></div>

<script>
const SUPABASE_URL = 'https://bmdrlnqtjkgkjryatdbz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_dES9U1T02LLNFXtR2RgtLg_b4UWK5cv';
const EQUIPES = ['Concentration','Soirée','Nuit'];
const ICONS = {Concentration:'☀️', Soirée:'🌆', Nuit:'🌙'};
const TYPES = {liaison:'🚛',colis:'📦',incident:'⚠️',anomalie:'🔧'};
const COLORS = {liaison:'#1a56a0',colis:'#d97706',incident:'#dc2626',anomalie:'#7c3aed'};

async function sbGet(path){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  const t = await res.text(); return t ? JSON.parse(t) : [];
}

function fmtDateTime(iso){
  if(!iso) return '—';
  const d = new Date(iso.endsWith('Z')?iso:iso+'Z');
  return d.toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtHeure(iso){
  if(!iso) return '—';
  const d = new Date(iso.endsWith('Z')?iso:iso+'Z');
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function parsePhotos(photoUrl){
  if(!photoUrl) return [];
  try{ const p=JSON.parse(photoUrl); return Array.isArray(p)?p:[photoUrl]; }
  catch(e){ return [photoUrl]; }
}

async function charger(){
  const params = new URLSearchParams(window.location.search);
  const vacationId = params.get('id');

  // Période : 11h00 hier → maintenant
  const maintenant = new Date();
  const hier = new Date(maintenant);
  hier.setDate(hier.getDate()-1);
  const dateDebut = hier.toISOString().split('T')[0] + 'T09:00:00Z'; // 11h UTC+2
  const dateFin = maintenant.toISOString();
  const dateLabel = `${hier.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})} 11h00 → ${maintenant.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})} ${fmtHeure(maintenant.toISOString())}`;
  document.getElementById('periode-label').textContent = dateLabel;

  try{
    const agents = await sbGet('agents?select=*');
    let vacations;

    if(vacationId){
      // Mode lien direct : afficher UNE vacation + toutes celles de la même période
      vacations = await sbGet(`vacations?created_at=gte.${dateDebut}&statut=eq.terminee&order=equipe.asc,date_debut.asc`);
      // Si la vacation demandée n'est pas dans la période, l'ajouter quand même
      const dansListe = vacations.find(v=>v.id===vacationId);
      if(!dansListe){
        const vSeule = await sbGet(`vacations?id=eq.${vacationId}&select=*`);
        if(vSeule.length) vacations = [...vSeule, ...vacations];
      }
    } else {
      // Mode récap : dernière vacation par équipe
      const toutes = await sbGet(`vacations?created_at=gte.${dateDebut}&statut=eq.terminee&order=date_fin.desc`);
      const dernieres = {};
      toutes.forEach(v=>{ if(!dernieres[v.equipe]) dernieres[v.equipe]=v; });
      vacations = Object.values(dernieres);
    }

    if(!vacations.length){
      document.getElementById('content').innerHTML = '<div class="card"><div class="empty">Aucune vacation enregistrée sur cette période.</div></div>';
      return;
    }

    let html = '';
    for(const equipe of EQUIPES){
      const vacsEquipe = vacations.filter(v=>v.equipe===equipe);
      if(!vacsEquipe.length) continue;

      html += `<div class="card equipe-${equipe}">
        <div class="equipe-header">
          <span style="font-size:20px">${ICONS[equipe]||'👤'}</span>
          <div class="equipe-title">${equipe.toUpperCase()}</div>
        </div>`;

      for(const v of vacsEquipe){
        const agent = agents.find(a=>a.id===v.agent_id);
        const [evts, liaisons] = await Promise.all([
          sbGet(`evenements_vacation?vacation_id=eq.${v.id}&order=created_at.asc`),
          sbGet(`liaisons?vacation_id=eq.${v.id}&order=created_at.asc`),
        ]);

        html += `<div class="agent-name">${agent?.prenom||'?'} ${agent?.nom||''}</div>
          <div class="meta">${fmtDateTime(v.date_debut)} → ${fmtDateTime(v.date_fin)}</div>`;

        // Tableau liaisons structurées
        if(liaisons.length){
          html += `<div class="section-title">🚛 Liaisons</div>
          <table class="table-liaisons">
            <thead><tr>
              <th>Liaison</th><th>Arrivée</th><th>Début</th><th>Fin</th>
              <th style="color:#93c5fd">Conc.</th>
              <th style="color:#c4b5fd">Disp.</th>
              <th style="color:#86efac">Dist.</th>
              <th>Total</th>
            </tr></thead>
            <tbody>
              ${liaisons.map((l,i)=>`<tr>
                <td>${l.nom}</td>
                <td>${l.heure_arrivee||'—'}</td>
                <td>${l.heure_debut_traitement||'—'}</td>
                <td>${l.heure_fin_traitement||'—'}</td>
                <td style="color:#1a56a0;font-weight:700">${l.colis_concentration||0}</td>
                <td style="color:#7c3aed;font-weight:700">${l.colis_dispersion||0}</td>
                <td style="color:#16a34a;font-weight:700">${l.colis_distribution||0}</td>
                <td style="font-weight:700">${(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0)}</td>
              </tr>`).join('')}
              <tr class="total-row">
                <td>TOTAL</td><td colspan="3"></td>
                <td>${liaisons.reduce((s,l)=>s+(l.colis_concentration||0),0)}</td>
                <td>${liaisons.reduce((s,l)=>s+(l.colis_dispersion||0),0)}</td>
                <td>${liaisons.reduce((s,l)=>s+(l.colis_distribution||0),0)}</td>
                <td>${liaisons.reduce((s,l)=>s+(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0),0)}</td>
              </tr>
            </tbody>
          </table>`;
        }

        // Autres événements (colis, incident, anomalie)
        const autresEvts = evts.filter(e=>e.type!=='liaison');
        if(autresEvts.length){
          html += `<div class="section-title" style="margin-top:12px">📋 Événements</div>`;
          autresEvts.forEach(e=>{
            const photos = parsePhotos(e.photo_url);
            html += `<div class="timeline-item">
              <div class="timeline-time">${fmtHeure(e.created_at)}</div>
              <div>
                <div class="timeline-type" style="color:${COLORS[e.type]||'#333'}">${TYPES[e.type]||'•'} ${e.type}</div>
                <div class="timeline-texte">${e.texte}</div>
                ${photos.map(url=>`<img src="${url}" class="evt-photo" style="max-width:200px" />`).join('')}
              </div>
            </div>`;
          });
        }

        if(!evts.length && !liaisons.length){
          html += `<div class="empty">Aucun élément enregistré.</div>`;
        }
        html += '<hr style="margin:14px 0;border:none;border-top:1px solid #eee">';
      }
      html += '</div>';
    }

    // Tableau récapitulatif global toutes équipes
    const toutesLiaisons = [];
    for(const equipe of EQUIPES){
      const vacsEquipe = vacations.filter(v=>v.equipe===equipe);
      for(const v of vacsEquipe){
        const lv = await sbGet(`liaisons?vacation_id=eq.${v.id}&order=created_at.asc`);
        lv.forEach(l=>toutesLiaisons.push({...l, equipe}));
      }
    }

    if(toutesLiaisons.length){
      html += `<div class="card" id="tableau-global">
        <div class="card-title">📊 Récapitulatif global — Toutes équipes confondues</div>
        <table class="table-liaisons">
          <thead><tr>
            <th>Équipe</th>
            <th>Liaison</th>
            <th>Arrivée</th>
            <th>Début</th>
            <th>Fin</th>
            <th style="color:#93c5fd">Conc.</th>
            <th style="color:#c4b5fd">Disp.</th>
            <th style="color:#86efac">Dist.</th>
            <th>Total</th>
          </tr></thead>
          <tbody>
            ${toutesLiaisons.map((l,i)=>`<tr style="background:${i%2===0?'#f4f6f9':'white'}">
              <td style="font-weight:700">${l.equipe}</td>
              <td style="font-weight:700">${l.nom}</td>
              <td style="text-align:center">${l.heure_arrivee||'—'}</td>
              <td style="text-align:center">${l.heure_debut_traitement||'—'}</td>
              <td style="text-align:center">${l.heure_fin_traitement||'—'}</td>
              <td style="text-align:center;color:#1a56a0;font-weight:700">${l.colis_concentration||0}</td>
              <td style="text-align:center;color:#7c3aed;font-weight:700">${l.colis_dispersion||0}</td>
              <td style="text-align:center;color:#16a34a;font-weight:700">${l.colis_distribution||0}</td>
              <td style="text-align:center;font-weight:700">${(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0)}</td>
            </tr>`).join('')}
            <tr class="total-row">
              <td colspan="2">TOTAL GÉNÉRAL</td>
              <td colspan="3"></td>
              <td style="text-align:center">${toutesLiaisons.reduce((s,l)=>s+(l.colis_concentration||0),0)}</td>
              <td style="text-align:center">${toutesLiaisons.reduce((s,l)=>s+(l.colis_dispersion||0),0)}</td>
              <td style="text-align:center">${toutesLiaisons.reduce((s,l)=>s+(l.colis_distribution||0),0)}</td>
              <td style="text-align:center">${toutesLiaisons.reduce((s,l)=>s+(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0),0)}</td>
            </tr>
          </tbody>
        </table>
      </div>`;

      // Stocker les données pour export Excel
      window._liaisonsData = toutesLiaisons;
      window._dateLabel = dateLabel;
    }

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px">
      <button class="btn-pdf" onclick="window.print()">🖨️ PDF / Imprimer</button>
      <button class="btn-pdf" style="background:#16a34a" onclick="exporterExcel()">📊 Télécharger Excel</button>
    </div>`;
    document.getElementById('content').innerHTML = html;
  }catch(e){
    document.getElementById('content').innerHTML = `<div class="card"><div class="empty">❌ Erreur : ${e.message}</div></div>`;
  }
}

charger();

function exporterExcel(){
  const liaisons = window._liaisonsData||[];
  if(!liaisons.length){ alert('Aucune donnée à exporter'); return; }

  const wb = XLSX.utils.book_new();
  const equipes = ['Concentration','Soirée','Nuit'];

  // Couleurs par équipe
  const EQUIPE_COLORS = {
    'Concentration': {titre:'1a56a0', clair:'dce8f8', fonce:'b3cef0'},
    'Soirée':        {titre:'d97706', clair:'fef3c7', fonce:'fde68a'},
    'Nuit':          {titre:'1a56a0', clair:'e0e7ef', fonce:'b8c9dd'},
  };
  const HEADER_COLOR = '1a1f2e';
  const TOTAL_COLOR  = '1a1f2e';

  function cellStyle(bg, bold=false, color='000000'){
    return { fill:{patternType:'solid',fgColor:{rgb:bg}}, font:{bold, color:{rgb:color}}, alignment:{horizontal:'center',vertical:'center'} };
  }

  function applyStyles(ws, rows){
    rows.forEach((row,ri)=>{
      row.forEach((val,ci)=>{
        const addr = XLSX.utils.encode_cell({r:ri,c:ci});
        if(!ws[addr]) ws[addr]={v:val,t:typeof val==='number'?'n':'s'};
        ws[addr].s = row._style || {};
      });
    });
  }

  // ── Feuille globale (toutes équipes) ──────────────────────────
  const ws1 = XLSX.utils.book_new && XLSX.utils.aoa_to_sheet([[]]);
  const wsData = [];
  const wsMerges = [];
  let row = 0;

  // Titre global
  wsData.push([{v:'📊 RÉCAPITULATIF GLOBAL — TOUTES ÉQUIPES', s:cellStyle(HEADER_COLOR,true,'FFFFFF')},...Array(8).fill({v:'',s:cellStyle(HEADER_COLOR,true,'FFFFFF')})]);
  wsMerges.push({s:{r:row,c:0},e:{r:row,c:8}});
  row++;

  // En-têtes colonnes
  const headers = ['Équipe','Liaison','Arrivée','Début trait.','Fin trait.','Concentration','Dispersion','Distribution','Total'];
  wsData.push(headers.map(h=>({v:h,s:cellStyle('374151',true,'FFFFFF')})));
  row++;

  equipes.forEach(eq=>{
    const lEq = liaisons.filter(l=>l.equipe===eq);
    if(!lEq.length) return;
    const c = EQUIPE_COLORS[eq];

    // Titre équipe
    wsData.push([{v:`${eq.toUpperCase()}`, s:cellStyle(c.titre,true,'FFFFFF')},...Array(8).fill({v:'',s:cellStyle(c.titre,true,'FFFFFF')})]);
    wsMerges.push({s:{r:row,c:0},e:{r:row,c:8}});
    row++;

    lEq.forEach((l,i)=>{
      const bg = i%2===0 ? c.clair : c.fonce;
      const vals = [eq, l.nom, l.heure_arrivee||'', l.heure_debut_traitement||'', l.heure_fin_traitement||'',
        l.colis_concentration||0, l.colis_dispersion||0, l.colis_distribution||0,
        (l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0)];
      wsData.push(vals.map(v=>({v,s:cellStyle(bg,false,'000000')})));
      row++;
    });

    // Sous-total équipe
    const st = [
      `Sous-total ${eq}`,'','','','',
      lEq.reduce((s,l)=>s+(l.colis_concentration||0),0),
      lEq.reduce((s,l)=>s+(l.colis_dispersion||0),0),
      lEq.reduce((s,l)=>s+(l.colis_distribution||0),0),
      lEq.reduce((s,l)=>s+(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0),0)
    ];
    wsData.push(st.map(v=>({v,s:cellStyle(c.titre,true,'FFFFFF')})));
    row++;

    // Ligne vide entre équipes
    wsData.push(Array(9).fill({v:'',s:{}}));
    row++;
  });

  // Total général
  const tg = ['TOTAL GÉNÉRAL','','','','',
    liaisons.reduce((s,l)=>s+(l.colis_concentration||0),0),
    liaisons.reduce((s,l)=>s+(l.colis_dispersion||0),0),
    liaisons.reduce((s,l)=>s+(l.colis_distribution||0),0),
    liaisons.reduce((s,l)=>s+(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0),0)
  ];
  wsData.push(tg.map(v=>({v,s:cellStyle(TOTAL_COLOR,true,'FFFFFF')})));

  const ws = XLSX.utils.aoa_to_sheet(wsData.map(r=>r.map(c=>c.v||'')));
  // Apply styles
  wsData.forEach((row,ri)=>{
    row.forEach((cell,ci)=>{
      const addr = XLSX.utils.encode_cell({r:ri,c:ci});
      if(ws[addr] && cell.s) ws[addr].s = cell.s;
    });
  });
  ws['!merges'] = wsMerges;
  ws['!cols'] = [{wch:16},{wch:22},{wch:10},{wch:13},{wch:13},{wch:14},{wch:12},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'Récap global');

  // ── Feuilles par équipe ───────────────────────────────────────
  equipes.forEach(eq=>{
    const lEq = liaisons.filter(l=>l.equipe===eq);
    if(!lEq.length) return;
    const c = EQUIPE_COLORS[eq];

    const rows = [
      [eq.toUpperCase(),...Array(7).fill('')],
      ['Liaison','Arrivée','Début trait.','Fin trait.','Concentration','Dispersion','Distribution','Total'],
      ...lEq.map(l=>[
        l.nom, l.heure_arrivee||'', l.heure_debut_traitement||'', l.heure_fin_traitement||'',
        l.colis_concentration||0, l.colis_dispersion||0, l.colis_distribution||0,
        (l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0)
      ]),
      ['TOTAL','','','',
        lEq.reduce((s,l)=>s+(l.colis_concentration||0),0),
        lEq.reduce((s,l)=>s+(l.colis_dispersion||0),0),
        lEq.reduce((s,l)=>s+(l.colis_distribution||0),0),
        lEq.reduce((s,l)=>s+(l.colis_concentration||0)+(l.colis_dispersion||0)+(l.colis_distribution||0),0)
      ]
    ];
    const wsEq = XLSX.utils.aoa_to_sheet(rows);

    // Styles
    const applyCell = (addr, bg, bold, color='000000')=>{
      if(!wsEq[addr]) wsEq[addr]={v:'',t:'s'};
      wsEq[addr].s = cellStyle(bg,bold,color);
    };
    // Titre
    for(let ci=0;ci<8;ci++) applyCell(XLSX.utils.encode_cell({r:0,c:ci}),c.titre,true,'FFFFFF');
    // Headers
    for(let ci=0;ci<8;ci++) applyCell(XLSX.utils.encode_cell({r:1,c:ci}),'374151',true,'FFFFFF');
    // Data rows
    lEq.forEach((_,i)=>{
      const bg = i%2===0 ? c.clair : c.fonce;
      for(let ci=0;ci<8;ci++) applyCell(XLSX.utils.encode_cell({r:2+i,c:ci}),bg,false);
    });
    // Total row
    const totalRow = 2+lEq.length;
    for(let ci=0;ci<8;ci++) applyCell(XLSX.utils.encode_cell({r:totalRow,c:ci}),TOTAL_COLOR,true,'FFFFFF');

    wsEq['!merges'] = [{s:{r:0,c:0},e:{r:0,c:7}}];
    wsEq['!cols'] = [{wch:22},{wch:10},{wch:13},{wch:13},{wch:14},{wch:12},{wch:14},{wch:10}];
    XLSX.utils.book_append_sheet(wb, wsEq, eq.substring(0,31));
  });

  const date = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
  XLSX.writeFile(wb, `liaisons-${date}.xlsx`);
}
</script>
</body>
</html>
